<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Ops - Advanced Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0f1a;
    color: #e6edf3;
}

header {
    padding: 10px;
    background: #111827;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    background: #111827;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
}

iframe {
    width: 100%;
    height: 300px;
    border: none;
}

#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0f1a;
    display: none;
    z-index: 9999;
    padding: 20px;
    box-sizing: border-box;
}

#overlay iframe {
    height: 90%;
}

#closeBtn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: white;
}
.weatherBox {
    font-size: 14px;
    line-height: 1.6;
}
</style>
</head>

<body>

<header>ADVANCED WEATHER MAPPING <a href="./index.html">Back</a></header>

<div class="grid">
    <div class="card" onclick="openFullscreen(this)">
        <h3>Weather - Wexford (Advanced)</h3>
        <div class="weatherBox" id="weather-wexford">Loading...</div>
    </div>
</div>

<div id="overlay">
    <div id="closeBtn" onclick="closeFullscreen()">✖</div>
    <div id="overlayContent"></div>
</div>

<script>
const API_KEY = "3fef706892496e493bb2a80e8b4c84fe";

async function loadWeather(city, elementId) {
    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`;
    
    const res = await fetch(url);
    const data = await res.json();

    const html = `
        Temp: ${data.main.temp}°C (Feels ${data.main.feels_like}°C)<br>
        Humidity: ${data.main.humidity}%<br>
        Wind: ${data.wind.speed} m/s<br>
        Pressure: ${data.main.pressure} hPa<br>
        Visibility: ${data.visibility / 1000} km<br>
        Condition: ${data.weather[0].description}
    `;

    document.getElementById(elementId).innerHTML = html;
}

loadWeather("Wexford", "weather-wexford");
</script>

<script>
function openFullscreen(card) {
    const overlay = document.getElementById("overlay");
    const content = document.getElementById("overlayContent");

    const clone = card.cloneNode(true);

    clone.onclick = null;

    const iframe = clone.querySelector("iframe");
    if (iframe) {
        iframe.style.height = "90vh";
    }

    content.innerHTML = "";
    content.appendChild(clone);

    overlay.style.display = "block";
    document.body.style.overflow = "hidden";
}

function closeFullscreen() {
    document.getElementById("overlay").style.display = "none";
    document.getElementById("overlayContent").innerHTML = "";
    document.body.style.overflow = "auto";
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        closeFullscreen();
    }
});

document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => openFullscreen(card));
});
</script>

</body>
</html>
