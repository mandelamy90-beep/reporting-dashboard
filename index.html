<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Ops Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0f1a;
    color: #e6edf3;
}

header {
    padding: 10px;
    background: #111827;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    background: #111827;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
}

iframe {
    width: 100%;
    height: 300px;
    border: none;
}

#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0f1a;
    display: none;
    z-index: 9999;
    padding: 20px;
    box-sizing: border-box;
}

#overlay iframe {
    height: 90%;
}

#closeBtn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: white;
}
</style>
</head>

<body>

<header>GLOBAL REPORTING DASHBOARD <a href="./advanced.html">See Advanced Weather Mapping</a><a href="./radar.html">See Weather Radar</a></header>

<div class="grid">
    <div class="card" onclick="openFullscreen(this)">
        <h3>Weather - Wexford</h3>
        <iframe src="https://wttr.in/Wexford"></iframe>
    </div>
    <div class="card" onclick="openFullscreen(this)">
        <h3>Weather - Dublin</h3>
        <iframe src="https://wttr.in/Dublin"></iframe>
    </div>

    <div class="card" onclick="openFullscreen(this)">
        <h3>Traffic - Wexford</h3>
        <iframe src="https://maps.google.com/maps?q=Wexford&t=&z=13&output=embed"></iframe>
    </div>

    <div class="card" onclick="openFullscreen(this)">
        <h3>Traffic - Eniscorthy</h3>
        <iframe src="https://maps.google.com/maps?q=Eniscorthy&t=&z=13&output=embed"></iframe>
    </div>

    <div class="card" onclick="openFullscreen(this)">
        <h3>Traffic - Gorey</h3>
        <iframe src="https://maps.google.com/maps?q=Gorey&t=&z=13&output=embed"></iframe>
    </div>

    <div class="card" onclick="openFullscreen(this)">
        <h3>Traffic - Bunclody</h3>
        <iframe src="https://maps.google.com/maps?q=Bunclody&t=&z=13&output=embed"></iframe>
    </div>

    <div class="card" onclick="openFullscreen(this)">
        <h3>Markets</h3>
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL"></iframe>
    </div>

    <div class="card" onclick="openFullscreen(this)">
        <h3>Crypto</h3>
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT"></iframe>
    </div>

</div>

<div id="overlay">
    <div id="closeBtn" onclick="closeFullscreen()">✖</div>
    <div id="overlayContent"></div>
</div>

<script>
function openFullscreen(card) {
    const overlay = document.getElementById("overlay");
    const content = document.getElementById("overlayContent");

    const clone = card.cloneNode(true);

    clone.onclick = null;

    const iframe = clone.querySelector("iframe");
    if (iframe) {
        iframe.style.height = "90vh";
    }

    content.innerHTML = "";
    content.appendChild(clone);

    overlay.style.display = "block";
    document.body.style.overflow = "hidden";
}

function closeFullscreen() {
    document.getElementById("overlay").style.display = "none";
    document.getElementById("overlayContent").innerHTML = "";
    document.body.style.overflow = "auto";
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        closeFullscreen();
    }
});

document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => openFullscreen(card));
});
</script>

</body>
</html>
